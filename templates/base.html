<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Auth System{% endblock %}</title>
</head>
<body>

    <style>
        body {
            width: 800px;
            margin: 30px auto;
            font-family: Arial, sans-serif;
        }

        nav {
            margin-bottom: 20px;
        }

        nav a {
            margin-right: 15px;
        }

        form {
            width: 400px;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 10px;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
        }
    </style>
    <nav>
        <a href="{% url 'register' %}">Регистрация</a>

        {% if user.is_authenticated %}
            <a href="{% url 'logout' %}">Выйти</a>
        {% else %}
            <a href="{% url 'login' %}">Войти</a>
        {% endif %}
    </nav>

    <hr>

    {% block content %}
    {% endblock %}

</body>
</html>
