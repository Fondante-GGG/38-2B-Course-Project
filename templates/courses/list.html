<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Title</title>
</head>
<body>

    <h1>Список курсов</h1>
    <form method="GET">
        <input type="text" 
        name="q"
        placeholder="Поиск по названию курса"
        value="{{ request.GET.q }}">
        <button type="submit">Найти</button>
    </form>
    <br>

    <a href="{% url 'create' %}">Добавить курс</a>

    <hr>

    {% for course in courses %}
    <div>
        <h2> {{ course.title }} </h2>

        <p> {{ course.teacher }} </p>

        <p> {{ course.duration }} </p>

        {% comment %} <a href="{% url 'update' course.id %}">Редактировать</a> {% endcomment %}
        {% comment %} <a href="{% url 'delete' course.id %}">Удалить</a> {% endcomment %}
    </div>
    <hr>
    {% endfor %}

</body>

</html>
